<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor IA - Poisson</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #09090b; --card-bg: #131418; --text-color: #f4f4f5; --text-muted: #a1a1aa; --border-color: #27272a; --fin-color: #3b82f6; --sau-color: #10b981; --danger-color: #ef4444; --warn-color: #f59e0b;}
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; padding: 20px;}
        .app-container { width: 100%; max-width: 500px; padding-bottom: 50px;}
        
        .card { background: linear-gradient(145deg, #16171a 0%, #111215 100%); border: 1px solid var(--border-color); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .form-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .form-group input { background: #18191c; border: 1px solid #33353b; padding: 12px; border-radius: 10px; color: white; font-size: 14px; width: 100%;}
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; color: white;}
        .btn-ai { background: linear-gradient(90deg, var(--fin-color), var(--sau-color)); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);}
        .btn:active { transform: scale(0.98); }
        .btn-small { padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; color: white; transition: 0.2s;}
        .bg-green { background: rgba(16, 185, 129, 0.2); color: var(--sau-color); border: 1px solid var(--sau-color); }
        .bg-red { background: rgba(239, 68, 68, 0.2); color: var(--danger-color); border: 1px solid var(--danger-color); }
        
        .escondido { display: none !important; }
        
        .result-box { text-align: center; background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); padding: 20px; border-radius: 15px; margin-top: 15px;}
        .result-title { font-size: 11px; color: var(--text-muted); font-weight:bold; text-transform:uppercase; letter-spacing: 0.5px; }
        .result-value { font-size: 28px; color: white; font-weight: 800; margin: 5px 0;}
        
        .prob-bar { width: 100%; height: 12px; background: #27272a; border-radius: 6px; display: flex; overflow: hidden; margin-top: 15px;}
        .prob-home { background: var(--fin-color); transition: width 0.5s; }
        .prob-draw { background: var(--warn-color); transition: width 0.5s; }
        .prob-away { background: var(--danger-color); transition: width 0.5s; }
        
        /* Estilos do Histórico */
        .history-item { background: #18191c; padding: 12px; border-radius: 12px; border: 1px solid #2a2c32; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px;}
        .history-header { display: flex; justify-content: space-between; align-items: center; }
        .history-title { font-size: 14px; font-weight: bold; color: white; }
        .history-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px;}
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <h2 style="text-align: center; margin-top: 0; color: var(--fin-color);">⚡ Predictor IA</h2>
        <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Modelo de Poisson</p>
        
        <div class="card" style="padding: 15px; background: #111215;">
            <div class="grid-2">
                <div class="form-group"><label>Liga - Média Gols Casa:</label><input type="number" id="l-home" step="0.01"></div>
                <div class="form-group"><label>Liga - Média Gols Fora:</label><input type="number" id="l-away" step="0.01"></div>
            </div>
        </div>

        <div class="card" style="padding: 15px; background: #111215; border-color: var(--fin-color);">
            <div class="form-group"><label style="color: var(--fin-color);">🏠 Mandante</label><input type="text" id="h-name"></div>
            <div class="grid-2">
                <div class="form-group"><label>Marcados (Casa):</label><input type="number" id="h-scored" step="0.01"></div>
                <div class="form-group"><label>Sofridos (Casa):</label><input type="number" id="h-conceded" step="0.01"></div>
            </div>
        </div>

        <div class="card" style="padding: 15px; background: #111215; border-color: var(--danger-color);">
            <div class="form-group"><label style="color: var(--danger-color);">✈️ Visitante</label><input type="text" id="a-name"></div>
            <div class="grid-2">
                <div class="form-group"><label>Marcados (Fora):</label><input type="number" id="a-scored" step="0.01"></div>
                <div class="form-group"><label>Sofridos (Fora):</label><input type="number" id="a-conceded" step="0.01"></div>
            </div>
        </div>

        <button class="btn btn-ai" onclick="calcularPrevisao()" id="btn-calcular">Calcular & Salvar</button>
    </div>

    <!-- ÁREA DE RESULTADOS -->
    <div id="card-resultado" class="card escondido">
        <h3 style="text-align: center; margin-top:0;">📊 Veredito da Máquina</h3>
        <div class="result-box">
            <div class="result-title">Ganhador Previsto</div>
            <div class="result-value" id="res-winner">--</div>
            <div style="font-size: 12px; color: var(--text-muted); margin-top:5px;">Placar Mais Provável: <strong style="color:white;" id="res-score">--</strong></div>
        </div>
        <div style="margin-top: 20px;">
            <div class="prob-bar">
                <div class="prob-home" id="bar-home" style="width: 33%;"></div>
                <div class="prob-draw" id="bar-draw" style="width: 33%;"></div>
                <div class="prob-away" id="bar-away" style="width: 34%;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-top: 5px;">
                <span style="color: var(--fin-color);" id="txt-home">--%</span>
                <span style="color: var(--warn-color);" id="txt-draw">--%</span>
                <span style="color: var(--danger-color);" id="txt-away">--%</span>
            </div>
        </div>
    </div>

    <!-- HISTÓRICO DE APOSTAS / PREVISÕES -->
    <div class="card" style="margin-top: 20px;">
        <h3 style="margin-top:0; font-size: 16px;">📜 Histórico / Win Rate</h3>
        <div id="lista-previsoes" style="max-height: 400px; overflow-y: auto; padding-right: 5px;">
            <p style="font-size:12px; color:var(--text-muted); text-align:center;">Carregando...</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
