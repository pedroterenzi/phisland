<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Dev Pessoal - Finanças</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: #131418;
            --accent-color: #3b82f6; /* Azul Financeiro */
            --text-color: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #27272a;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --educator-bg: rgba(245, 158, 11, 0.1);
            --educator-text: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; padding-bottom: 80px; }
        .app-container { width: 100%; max-width: 500px; padding: 20px; }
        
        .card { background: linear-gradient(145deg, #16171a 0%, #111215 100%); border: 1px solid var(--border-color); padding: 24px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
        
        .saldo-header { text-align: center; margin-bottom: 20px; }
        .saldo-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}
        .saldo-valor { font-size: 38px; font-weight: 800; color: #fff; margin-top: 4px; }
        
        .progress-container { width: 100%; background: #27272a; height: 10px; border-radius: 10px; margin-top: 10px; overflow: hidden;}
        .progress-bar { height: 100%; border-radius: 10px; transition: width 0.5s; background: var(--accent-color); }
        
        .educator-card { background: var(--educator-bg); border: 1px solid rgba(245, 158, 11, 0.3); padding: 16px; border-radius: 16px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 20px;}
        .educator-icon { font-size: 20px; }
        .educator-text h4 { margin: 0 0 4px 0; color: var(--educator-text); font-size: 14px; }
        .educator-text p { margin: 0; font-size: 13px; color: #d4d4d8; line-height: 1.4; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--accent-color); color: white; }
        .btn-wpp { background: #25D366; color: black; margin-top: 10px; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); border: 1px solid rgba(239,68,68,0.3); margin-top: 10px;}

        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .form-group input, .form-group select { background: #18191c; border: 1px solid #33353b; padding: 14px; border-radius: 12px; color: white; font-size: 14px; }
        
        .escondido { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="tela-dashboard">
        <div class="card saldo-header">
            <div class="saldo-label">Saldo Disponível</div>
            <div class="saldo-valor" id="lbl-saldo">R$ 0,00</div>
            
            <div style="display: flex; justify-content: space-between; margin-top: 20px; font-size: 13px;">
                <span style="color: var(--text-muted);">Gastos do Mês</span>
                <span style="font-weight: 600;" id="lbl-gastos">R$ 0,00 / R$ 0,00</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="barra-progresso" style="width: 0%;"></div>
            </div>
        </div>

        <div class="educator-card">
            <div class="educator-icon">💡</div>
            <div class="educator-text">
                <h4>Conselho do Educador</h4>
                <p id="lbl-educador">Carregando análise financeira...</p>
            </div>
        </div>

        <button class="btn btn-primary" onclick="alternarTela('tela-nova-transacao')">+ Lançar Transação</button>
        <button class="btn btn-wpp" onclick="window.open('https://wa.me/5511999999999?text=Olá, preciso de ajuda com minhas metas.', '_blank')">💬 Falar com Consultor</button>
    </div>

    <div id="tela-nova-transacao" class="escondido card">
        <h3 style="margin-top: 0;">Nova Transação</h3>
        
        <div class="form-group">
            <label>Tipo:</label>
            <select id="input-tipo">
                <option value="expense">Despesa (Saída)</option>
                <option value="income">Receita (Entrada)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Valor (R$):</label>
            <input type="number" id="input-valor" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
            <label>Categoria:</label>
            <select id="input-categoria">
                <option>Alimentação</option>
                <option>Transporte</option>
                <option>Lazer</option>
                <option>Salário</option>
            </select>
        </div>
        <div class="form-group">
            <label>Data:</label>
            <input type="date" id="input-data">
        </div>

        <button class="btn btn-primary" id="btn-salvar" onclick="salvarTransacao()">Salvar Lançamento</button>
        <button class="btn btn-danger" onclick="alternarTela('tela-dashboard')">Cancelar</button>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
